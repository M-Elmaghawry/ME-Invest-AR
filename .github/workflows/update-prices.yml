name: Update Market Prices

on:
  schedule:
    # Run daily at 9:00 AM UTC (12:00 PM Egypt time)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

  # Needed so the workflow can push updated market-history.json back to the repo
permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          
      - name: Update market prices
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
        run: python scripts/update_prices.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add market-history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 تحديث تلقائي: $(date +'%Y-%m-%d')" && git push)
